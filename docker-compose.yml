name: cms_faceid
version: '3.8'

services:
  # Database postgres riêng của hệ thống
  postgres-db:
    image: postgres:15-alpine
    container_name: cms_faceid-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password # Hãy đổi mật khẩu này khi triển khai thực tế
      POSTGRES_DB: cms_webserver
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - cms-faceid-network

  # Backend NestJS
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: cms_faceid-backend:latest
    container_name: cms_faceid-backend
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Biến cấu hình Database riêng và các Database bên thứ 3 kết nối qua mạng docker hoặc IP Host
      - CMS_WEBSERVER_DATABASE_URL=postgresql://postgres:your_secure_password@postgres-db:5432/cms_webserver?connect_timeout=15
      - LCMS_DATABASE_URL=postgresql://postgres:smartdvms@host.docker.internal:5432/lcms_server?connect_timeout=15&pooling=true&minpoolsize=0&maxpoolsize=200
      - DVMS_DATABASE_URL=postgresql://postgres:smartdvms@host.docker.internal:5432/dvms_server?connect_timeout=15
      - PORT=3000
      - IMAGE_LOCAL_PATH=E:\EventData\Images
      - IMAGE_MOUNT_PATH=/app/event-images
    volumes:
      - 'E:\EventData\Images:/app/event-images:ro'
    depends_on:
      - postgres-db
    restart: always
    networks:
      - cms-faceid-network

  # Nginx Reverse Proxy làm cổng HTTP (cổng 80)
  nginx:
    image: nginx:alpine
    container_name: cms_faceid-nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
    networks:
      - cms-faceid-network

volumes:
  pgdata:
    driver: local

networks:
  cms-faceid-network:
    driver: bridge
