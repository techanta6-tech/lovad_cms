name: cms_faceid
version: '3.8'

services:
  # Database postgres riêng của hệ thống
  postgres-db:
    image: postgres:15-alpine
    container_name: cms_faceid-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password # Hãy đổi mật khẩu này khi triển khai thực tế
      POSTGRES_DB: cms_webserver
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - cms-faceid-network

  # Backend NestJS
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: cms_faceid-backend:latest
    container_name: cms_faceid-backend
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - apps/backend/.env
    volumes:
      - '${HOST_IMAGE_PATH}:/app/event-images:ro'
    depends_on:
      - postgres-db
    restart: always
    networks:
      - cms-faceid-network

  # Nginx Reverse Proxy làm cổng HTTP (cổng 80)
  nginx:
    image: nginx:alpine
    container_name: cms_faceid-nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
    networks:
      - cms-faceid-network

  # Frontend React Web
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_WS_URL=http://localhost:8082
    image: cms_faceid-frontend:latest
    container_name: cms_faceid-frontend
    ports:
      - "3035:3035"
    restart: always
    networks:
      - cms-faceid-network

volumes:
  pgdata:
    driver: local

networks:
  cms-faceid-network:
    driver: bridge
